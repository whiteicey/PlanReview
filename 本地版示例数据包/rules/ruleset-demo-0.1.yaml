metadata:
  name: 示例规则集
  version: 0.1.0-demo
  source_type: DEMO_ONLY
rules:
- rule_id: COMPLETENESS-001
  version: 0.1.0-demo
  name: 必备章节存在
  category: completeness
  severity: medium
  operator: required_sections_exist
  required_sections:
  - 总则与编制说明
  - 项目概况
  - 开发部署方案
  - 产能与生产预测
  - 井工程方案
  - 地面工程方案
  - 结论与实施建议
  on_missing: fail
  source_type: DEMO_ONLY
  enabled: true
- rule_id: COMPLETENESS-002
  version: 0.1.0-demo
  name: 关键参数表存在
  category: completeness
  severity: medium
  operator: required_parameter_table_exists
  required_table_keywords:
  - 关键参数
  - 主要技术指标
  - 井数
  on_missing: unknown
  source_type: DEMO_ONLY
  enabled: true
- rule_id: CONSISTENCY-001
  version: 0.1.0-demo
  name: 开发井总数跨位置一致
  category: consistency
  severity: high
  operator: all_equal
  parameter: 开发井总数
  selectors:
  - 摘要
  - 开发部署方案
  - 关键参数表
  - 井数或井位表
  match_dimensions:
  - subject
  - time_scope
  - statistical_scope
  absolute_tolerance: 0
  on_missing: unknown
  source_type: DEMO_ONLY
  enabled: true
- rule_id: CONSISTENCY-002
  version: 0.1.0-demo
  name: 分类井数等于总井数
  category: aggregation
  severity: high
  operator: sum_equals
  target: 开发井总数
  components:
  - 生产井数
  - 评价/探井数
  absolute_tolerance: 0
  on_missing: unknown
  source_type: DEMO_ONLY
  enabled: true
- rule_id: CONSISTENCY-003
  version: 0.1.0-demo
  name: 单井产能与总设计产能关系
  category: aggregation
  severity: medium
  operator: product_approximately_equals
  left:
  - 开发井总数
  - 单井设计产能
  right: 总设计产能
  relative_tolerance: 0.05
  on_missing: unknown
  source_type: DEMO_ONLY
  enabled: true
- rule_id: CAPACITY-001
  version: 0.1.0-demo
  name: 高峰产量不超过地面处理能力
  category: cross_domain
  severity: high
  operator: less_or_equal
  left: 高峰产量
  right: 地面处理能力
  match_dimensions:
  - subject
  - time_scope
  - condition
  on_missing: unknown
  source_type: DEMO_ONLY
  enabled: true
- rule_id: VERSION-001
  version: 0.1.0-demo
  name: 关键参数变化需要说明
  category: version_change
  severity: medium
  operator: change_requires_reason
  parameters:
  - 开发井总数
  - 单井设计产能
  - 总设计产能
  - 高峰产量
  - 地面处理能力
  - 建设周期
  - 首次投产时间
  reason_keywords:
  - 调整原因
  - 变更说明
  - 依据
  - 审查意见
  - 复核
  on_missing: suspected
  source_type: DEMO_ONLY
  enabled: true
- rule_id: VERSION-002
  version: 0.1.0-demo
  name: 上一轮意见应存在回复状态
  category: version_change
  severity: medium
  operator: issue_response_status_exists
  required_status:
  - 待整改
  - 整改中
  - 已整改
  - 已闭环
  on_missing: unknown
  source_type: DEMO_ONLY
  enabled: true
- rule_id: TERM-001
  version: 0.1.0-demo
  name: 参数别名应归一
  category: terminology
  severity: low
  operator: alias_normalization
  dictionary: terminology-demo-0.1.yaml
  on_missing: unknown
  source_type: DEMO_ONLY
  enabled: true
- rule_id: EVIDENCE-001
  version: 0.1.0-demo
  name: 问题必须关联原文证据
  category: evidence
  severity: high
  operator: evidence_required
  minimum_evidence_count: 1
  on_missing: block
  source_type: DEMO_ONLY
  enabled: true
