rules:
  - rule_id: DEMO-COMP-CYCLE
    version: 0.1.0-demo
    name: construction cycle and production date compatibility
    category: consistency
    severity: medium
    operator: legacy_compatibility
    on_missing: unknown
    source_type: DEMO_ONLY
    params:
      parameter: 建设周期
      triggers: [建设周期冲突, 建设周期和投产时间疑似冲突, 投产时间与建设周期疑似不匹配]
      legacy_human_review: true
      message: 建设周期与首次投产时间需要复核
  - rule_id: DEMO-COMP-ANNUAL
    version: 0.1.0-demo
    name: annual output scope evidence
    category: unknown_scope
    severity: medium
    operator: legacy_compatibility
    on_missing: unknown
    source_type: DEMO_ONLY
    params:
      parameter: 年度产量
      triggers: [单位和口径不足, 年度产量]
      unknown_on_match: true
  - rule_id: DEMO-COMP-DATE
    version: 0.1.0-demo
    name: first production date compatibility
    category: consistency
    severity: medium
    operator: legacy_compatibility
    on_missing: unknown
    source_type: DEMO_ONLY
    params:
      parameter: 首次投产时间
      triggers: [投产时间与建设周期疑似不匹配, 投产时间冲突, 建设周期和投产时间疑似冲突]
      legacy_human_review: true
      message: 首次投产时间与建设周期需要复核
  - rule_id: DEMO-COMP-WELLS
    version: 0.1.0-demo
    name: production well version change
    category: consistency
    severity: medium
    operator: legacy_compatibility
    on_missing: unknown
    source_type: DEMO_ONLY
    params:
      parameter: 生产井数
      triggers: [生产井数版本内冲突]
      legacy_human_review: true
      message: 生产井数版本变化需要复核
  - rule_id: DEMO-COMP-TERM
    version: 0.1.0-demo
    name: raw terminology alias consistency
    category: terminology
    severity: low
    operator: legacy_compatibility
    on_missing: unknown
    params:
      parameter: 开发井总数
      triggers: [同义参数表达不统一]
      message: 参数别名未统一
  - rule_id: DEMO-COMP-HISTORICAL-REPLY
    version: 0.1.0-demo
    name: historical review reply change
    category: version_change
    severity: medium
    operator: legacy_compatibility
    on_missing: unknown
    source_type: DEMO_ONLY
    params:
      parameter: 审查意见回复
      triggers: [历史意见未闭环]
      legacy_human_review: true
      message: 历史审查意见回复需要复核
  - rule_id: DEMO-COMP-REPLY
    version: 0.1.0-demo
    name: response table completeness
    category: completeness
    severity: medium
    operator: legacy_compatibility
    on_missing: unknown
    params:
      parameter: 审查意见回复
      triggers: [审查意见回复缺少状态]
      legacy_human_review: true
      message: 审查意见回复缺少状态
